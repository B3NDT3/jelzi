<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <!-- <link rel="stylesheet" type="text/css" href="src/css/style.css"> -->
    <script src="src/js/main.js"></script>
    <title>Title</title>
    <link rel="shortcut icon" type="image/x-icon" href="src/img/pixelheart.png">
  </head>



  <body>
    <div class="main-container">
        <div class="top-container">
            <div class="frame frame-top"></div>
        </div>
        <div class="bottom-container">
                  <div class="frame frame-left"></div>
      <div class="frame frame-right"></div>
        </div>

    </div>
  </body>

<style>

  :root {
  --pgrey: #23272a;
   --backgroundColor: #1B1B1B;
   --backgroundGrey:#1B1B1B;
   --white: #fbfbfb;
   --lightgrey: #32333B;
   --midgrey: #1C1D22;
   --darkgrey: #151317;
   --grey: #8d8d8d;
   --eisschnapsblau: #9CE7E7;
   /* --eisschnapsblau: #42b0ef; */
   --blau: #00a2ed;
   /* --redshine: #df3a3a; */
      --redshine: #F56B6B;
   --red: #ff3131;
}

body {

   display: flex;
   justify-content: center;
   align-items: center;
}
.main-container {
  height: 1080px;
  width: 1920px;
  display: flex;
  flex-direction: column;
  justify-content: space-evenly;
  margin-top: 80px;
}

.top-container {
    display: flex;
    justify-content: center;
}

.bottom-container {
    display: flex;
    width: 100%;
    justify-content: space-evenly;
}

.frame {
  width: 804px;
  height: 452px;
}

.frame-top {
border: solid var(--white) 12px;
/* filter: drop-shadow(0 0 40px var(--grey)); */
  box-shadow: 0 0 30px 3px var(--white),
  inset 0 0 10px var(--white);
  border-radius: 15px;
  margin-bottom: -30px;
}

.frame-left {
border: solid var(--eisschnapsblau) 12px;
  box-shadow: 0 0 40px 3px var(--blau),
  inset 0 0 10px var(--blau);
  border-radius: 15px;
  margin-left: 90px;
}
.frame-right {
border: solid var(--redshine) 12px;
  box-shadow: 0 0 40px 3px var(--red),
  inset 0 0 10px var(--red);
  border-radius: 15px;
  margin-right: 90px;
}
</style>

  
</html>
