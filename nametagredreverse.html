<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <script src="src/js/main.js"></script>
    <title>Title</title>
    <link rel="shortcut icon" type="image/x-icon" href="src/img/pixelheart.png">
  </head>



  <body>
<div class="main-container">
      <div class="text-box"></div>
      <div class="container">
      <div class="parallelogram"></div>
      <div class="parallelogram"></div>
      <div class="parallelogram"></div>

</div></div>

  </body>

<style>

* {

  font-family: 'Libre Franklin', sans-serif;
  
}

  :root {
  --pgrey: #23272a;
   --backgroundColor: #1B1B1B;
   --backgroundGrey:#1B1B1B;
   --white: #fbfbfb;
   --lightgrey: #32333B;
   --midgrey: #1C1D22;
   --darkgrey: #151317;
   --eisschnapsblau: #4bd2d2;
   --blau: #00a2ed;
   --redshine: #f56b6b;
   --red: #ff3131;
}

body {
  height: 100%;
  width: 100%;
}

.main-container {
    display: flex;
    position: absolute;
    flex-direction: row;
    left: 20px;
    top: 60px;
}

.container {
  display: flex;
  flex-direction: column;
  position: relative;
  height: 200px;
  width: 500px;
  margin-left: 50px;
}

.parallelogram {
  position: absolute;
  height: 70px;
  transform: skew(20deg);
  will-change: auto;
  animation: parallelogram-move linear 15s infinite;
}
.text-box {
  position: absolute;
  border-left: var(--red) solid 12px;
  background-color: var(--lightgrey);
  height: 70px;
  width: 200px;
    z-index: 1;
}
  .parallelogram:nth-of-type(1){
  background: var(--lightgrey);
  z-index: 3;
    width: 300px;
}
.parallelogram:nth-of-type(2){
  z-index: 2;
  left: 30px;
    width: 290px;
  background: var(--midgrey);
}
.parallelogram:nth-of-type(3){
  z-index: 1;  
  left: 60px;
    width: 280px;
  background: var(--darkgrey);
}
  
@keyframes parallelogram-move {
  0%,100% {
  transform:scaleX(1) skew(20deg) ;
  }
  50% {
  transform:scaleX(1.2) skew(20deg);
  }
}

  
</style>

  
</html>
